<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
        <script
            src="https://kit.fontawesome.com/860bdaf46c.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <header class="container" id="date"></header>
        <main>
            <h1 contenteditable="true" spellcheck="false">
                John Doe Dashboard
            </h1>
            <section class="flex-row">
                <div class="container">
                    <h2>Snabblänkar</h2>
                    <div class="inner-content" id="quick-links"></div>
                    <button class="bottom-btn" id="link-btn">
                        <i class="fa-solid fa-circle-plus"></i>Lägg till länk
                    </button>
                </div>
                <div class="container">
                    <h2>Dagens väder</h2>
                    <div class="inner-content" id="weather"></div>
                    <div class="loader"></div>
                </div>
                <div class="container">
                    <h2>Humorlådan</h2>
                    <div class="inner-content" id="joke"></div>
                    <button class="bottom-btn" id="joke-btn">
                        <i class="fa-solid fa-face-laugh"></i>
                        Nytt skämt
                    </button>
                </div>
                <div class="container">
                    <h2>Anteckningar</h2>
                    <textarea
                        class="inner-container"
                        spellcheck="false"
                    ></textarea>
                </div>
            </section>
            <div class="background"></div>
            <dialog id="link-dialog">
                <h3>Lägg till länk</h3>
                <form method="dialog" id="dialog-form">
                    <input
                        type="text"
                        id="dialog-url"
                        placeholder="URL"
                        autofocus
                        required
                    />
                    <input
                        type="text"
                        id="dialog-link-title"
                        placeholder="Namn"
                        required
                    />
                    <button type="submit">Lägg till länk</button>
                </form>
                <i class="fa-solid fa-circle-xmark" id="close-dialog-btn"></i>
            </dialog>
        </main>
        <footer>
            <button id="bg-btn">
                <i class="fa-solid fa-arrow-rotate-right"></i>
                Slumpa ny bakgrund
            </button>
        </footer>
    </body>
</html>
